<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="780" height="580" rx="14" fill="#f7f8fa" stroke="#d7dbe0" stroke-width="1.5"/>
  <text x="30" y="42" font-size="22" font-weight="700" fill="#1b2733">ABB IRB 1300-11/0.9 — Working Envelope (side view)</text>
  <text x="30" y="64" font-size="13" fill="#6a7580">Mặt phẳng R–Z · gốc = tâm đế trên sàn · đơn vị mm</text>

  <!-- ground -->
  <line x1="60" y1="500" x2="720" y2="500" stroke="#9aa4af" stroke-width="2"/>
  <rect x="60" y="500" width="660" height="14" fill="#e9ecef"/>
  <text x="64" y="524" font-size="12" fill="#8a94a0">Sàn / mặt lắp (Z = 0)</text>

  <!-- vertical axis Z through base center x=390 -->
  <line x1="390" y1="500" x2="390" y2="86" stroke="#c2c8d0" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="396" y="96" font-size="12" fill="#8a94a0">+Z</text>

  <!-- max reach circle r=900mm*0.30=270 centered at J2 (390, 500-544*0.30=337) -->
  <clipPath id="above"><rect x="60" y="86" width="660" height="414"/></clipPath>
  <g clip-path="url(#above)">
    <circle cx="390" cy="337" r="270" fill="#e4002b" fill-opacity="0.06" stroke="#e4002b" stroke-width="2" stroke-dasharray="7 5"/>
    <circle cx="390" cy="337" r="60" fill="#ffffff" stroke="#d08" stroke-width="1.6" stroke-dasharray="4 4"/>
  </g>

  <!-- base column: ground to J2 center (544mm) -->
  <rect x="372" y="337" width="36" height="163" rx="4" fill="#2b3a4a"/>
  <circle cx="390" cy="337" r="9" fill="#e4002b"/>
  <text x="410" y="341" font-size="12" fill="#1b2733" font-weight="600">Khớp 2 (tâm bao hình)</text>

  <!-- Z_MAX line 1450 -> y=500-1450*0.30=500-435... clamp; use 0.285 scale note -->
  <line x1="120" y1="107" x2="660" y2="107" stroke="#2e7d32" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="124" y="102" font-size="12" fill="#2e7d32" font-weight="600">Z_MAX ≈ 1450 mm (giới hạn IK)</text>

  <!-- Z_MIN line 150 -> y=500-150*0.30=455 -->
  <line x1="120" y1="455" x2="660" y2="455" stroke="#c77700" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="124" y="450" font-size="12" fill="#c77700" font-weight="600">Z_MIN ≈ 150 mm (giới hạn IK)</text>

  <!-- reach dimension arrow (horizontal) from center to envelope at J2 height -->
  <line x1="390" y1="337" x2="660" y2="337" stroke="#e4002b" stroke-width="1.4"/>
  <polygon points="660,337 650,332 650,342" fill="#e4002b"/>
  <text x="470" y="330" font-size="13" fill="#e4002b" font-weight="700">Tầm với 900 mm</text>

  <!-- base height dimension -->
  <line x1="330" y1="337" x2="330" y2="500" stroke="#2b3a4a" stroke-width="1.2"/>
  <polygon points="330,337 325,347 335,347" fill="#2b3a4a"/>
  <polygon points="330,500 325,490 335,490" fill="#2b3a4a"/>
  <text x="236" y="422" font-size="12" fill="#2b3a4a" font-weight="600">Đế 544 mm</text>

  <!-- min reach label -->
  <text x="396" y="410" font-size="11" fill="#d08">vùng chết ~200 mm</text>

  <!-- legend -->
  <g font-size="12" fill="#41505e">
    <rect x="470" y="452" width="250" height="86" rx="8" fill="#ffffff" stroke="#dfe3e8"/>
    <line x1="484" y1="470" x2="512" y2="470" stroke="#e4002b" stroke-width="2" stroke-dasharray="7 5"/>
    <text x="520" y="474">Tầm với tối đa (REACH_MAX)</text>
    <line x1="484" y1="492" x2="512" y2="492" stroke="#d08" stroke-width="1.6" stroke-dasharray="4 4"/>
    <text x="520" y="496">Vùng không tới (REACH_MIN)</text>
    <line x1="484" y1="514" x2="512" y2="514" stroke="#2e7d32" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text x="520" y="518">Giới hạn Z kiểm tra trước IK</text>
  </g>
</svg>
